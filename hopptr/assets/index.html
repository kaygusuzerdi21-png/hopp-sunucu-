  <script>
    // scale the 402×874 device to fit the viewport
    function fit() {
      const scaler = document.getElementById('scaler');
      const W = 412, H = 892, m = 24;
      const s = Math.min((window.innerWidth - m) / W, (window.innerHeight - m) / H, 1.1);
      scaler.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
    // re-fit once device mounts
    const obs = new MutationObserver(fit);
    obs.observe(document.getElementById('root'), { childList: true, subtree: true });
    setTimeout(fit, 400);
  </script>
